<div class="sidebar">

  <div class="brand">
    <h2>TMS</h2>
    <p>Task Manager</p>
  </div>

  <ul>

    <li
      routerLink="/dashboard"
      routerLinkActive="active-link">
      📊 Dashboard
    </li>

    <li
      routerLink="/tasks"
      routerLinkActive="active-link">
      📋 Tasks
    </li>

    @if(role === 'admin' || role === 'manager'){

      <li
        routerLink="/project-center"
        routerLinkActive="active-link">
        🎯 Project Center
      </li>

    }

    @if(role === 'admin'){

      <li
        routerLink="/team-workspace"
        routerLinkActive="active-link">
        👥 Team Workspace
      </li>

      <li
        routerLink="/analytics"
        routerLinkActive="active-link">
        📈 Analytics
      </li>

    }

    <li
      routerLink="/login"
      routerLinkActive="active-link"
      (click)="logout()">
      🚪 Logout
    </li>

  </ul>

</div>
